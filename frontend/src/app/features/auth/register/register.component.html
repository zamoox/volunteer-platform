<div class="min-h-screen flex items-center justify-center bg-slate-50 p-6 font-sans">
  <!-- Основний контейнер з динамічною інверсією фону -->
  <div 
    class="w-full max-w-lg rounded-[2.5rem] shadow-2xl p-10 border transition-all duration-500 ease-in-out"
    [class.bg-white]="registerForm.get('userType')?.value === 'individual'"
    [class.border-slate-100]="registerForm.get('userType')?.value === 'individual'"
    [class.bg-blue-600]="registerForm.get('userType')?.value === 'organization'"
    [class.border-blue-500]="registerForm.get('userType')?.value === 'organization'"
    [class.is-organization]="registerForm.get('userType')?.value === 'organization'"
  >
    
    <!-- Заголовок -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4 transition-colors duration-500"
           [class.bg-blue-50]="registerForm.get('userType')?.value === 'individual'"
           [class.bg-white/20]="registerForm.get('userType')?.value === 'organization'">
        <span class="text-2xl">{{ registerForm.get('userType')?.value === 'individual' ? '✨' : '🏢' }}</span>
      </div>
      <h2 class="text-3xl font-black tracking-tight leading-none transition-colors duration-500"
          [class.text-slate-900]="registerForm.get('userType')?.value === 'individual'"
          [class.text-white]="registerForm.get('userType')?.value === 'organization'">
        {{ registerForm.get('userType')?.value === 'individual' ? 'Реєстрація' : 'Реєстрація ГО' }}
      </h2>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      
      <!-- Перемикач типу (Toggle) -->
      <div class="flex p-1 rounded-2xl border transition-all duration-500"
           [class.bg-slate-50]="registerForm.get('userType')?.value === 'individual'"
           [class.border-slate-100]="registerForm.get('userType')?.value === 'individual'"
           [class.bg-blue-700/40]="registerForm.get('userType')?.value === 'organization'"
           [class.border-white/20]="registerForm.get('userType')?.value === 'organization'">
        
        <label class="flex-1 text-center py-3 rounded-xl cursor-pointer transition-all font-bold text-sm"
               [class.bg-white]="registerForm.get('userType')?.value === 'individual'"
               [class.text-blue-600]="registerForm.get('userType')?.value === 'individual'"
               [class.text-blue-100]="registerForm.get('userType')?.value === 'organization'">
          <input type="radio" formControlName="userType" value="individual" class="hidden">
          Фізична особа
        </label>
        
        <label class="flex-1 text-center py-3 rounded-xl cursor-pointer transition-all font-bold text-sm"
               [class.bg-blue-500]="registerForm.get('userType')?.value === 'organization'"
               [class.text-white]="registerForm.get('userType')?.value === 'organization'"
               [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'">
          <input type="radio" formControlName="userType" value="organization" class="hidden">
          ГО / Організація
        </label>
      </div>

      <!-- Ім'я / Назва ГО -->
      <div class="space-y-1">
        <label 
          class="text-[10px] font-black uppercase tracking-[0.2em] ml-1 transition-colors duration-500"
          [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'"
          [class.text-white]="registerForm.get('userType')?.value === 'organization'"
        >
          {{ registerForm.get('userType')?.value === 'individual' ? "Ім'я та Прізвище" : "Назва організації" }}
        </label>
        <input formControlName="name" type="text" class="form-input" [class.error]="isInvalid('name')">
      </div>

      <!-- Email -->
      <div class="space-y-1">
        <label 
          class="text-[10px] font-black uppercase tracking-[0.2em] ml-1 transition-colors duration-500"
          [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'"
          [class.text-white]="registerForm.get('userType')?.value === 'organization'"
        >
          Email
        </label>
        <input formControlName="email" type="email" class="form-input" [class.error]="isInvalid('email')">
      </div>

      <!-- Локація -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label 
            class="text-[10px] font-black uppercase tracking-[0.2em] ml-1 transition-colors duration-500"
            [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'"
            [class.text-white]="registerForm.get('userType')?.value === 'organization'"
          >
            Область
          </label>
          <select formControlName="region" class="form-input" [class.error]="isInvalid('region')">
            <option value="" disabled selected>Оберіть...</option>
            <option *ngFor="let r of regions" [value]="r">{{r}}</option>
          </select>
        </div>
        <div class="space-y-1">
          <label 
            class="text-[10px] font-black uppercase tracking-[0.2em] ml-1 transition-colors duration-500"
            [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'"
            [class.text-white]="registerForm.get('userType')?.value === 'organization'"
          >
            Місто
          </label>
          <input formControlName="city" type="text" placeholder="Київ" class="form-input" [class.error]="isInvalid('city')">
        </div>
      </div>

      <!-- Пароль -->
      <div class="space-y-1">
        <label 
          class="text-[10px] font-black uppercase tracking-[0.2em] ml-1 transition-colors duration-500"
          [class.text-slate-400]="registerForm.get('userType')?.value === 'individual'"
          [class.text-white]="registerForm.get('userType')?.value === 'organization'"
        >
          Пароль
        </label>
        <input formControlName="password" type="password" placeholder="••••••••" class="form-input" [class.error]="isInvalid('password')">
      </div>

      <!-- Кнопка -->
      <button 
        type="submit" 
        [disabled]="isLoading" 
        class="w-full mt-6 py-5 rounded-2xl font-black text-sm transition-all duration-300 active:scale-[0.98] disabled:opacity-50 shadow-xl"
        [class.bg-blue-600]="registerForm.get('userType')?.value === 'individual'"
        [class.text-white]="registerForm.get('userType')?.value === 'individual'"
        [class.bg-white]="registerForm.get('userType')?.value === 'organization'"
        [class.text-blue-600]="registerForm.get('userType')?.value === 'organization'"
      >
        {{ isLoading ? 'Реєстрація...' : 'Зареєструватися' }}
      </button>
    </form>
  </div>
</div>
