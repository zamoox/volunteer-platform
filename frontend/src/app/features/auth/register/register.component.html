<div class="min-h-[90vh] flex items-center justify-center bg-slate-50 p-4 font-sans">
  <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-10 border border-slate-100 animate-in fade-in zoom-in duration-500">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-50 rounded-2xl mb-4">
        <span class="text-2xl">✨</span>
      </div>
      <h2 class="text-3xl font-black tracking-tight text-slate-900 leading-none">Створити акаунт</h2>
      <p class="text-slate-400 mt-3 font-medium text-sm">Приєднуйтесь до нашої спільноти волонтерів</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      
      <!-- Name -->
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Як вас звати?</label>
        <input formControlName="name" type="text" placeholder="Олександр" class="form-input">
      </div>

      <!-- Email -->
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Email</label>
        <input formControlName="email" type="email" placeholder="volunter@ukr.net" class="form-input">
      </div>

      <!-- Password -->
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Пароль</label>
        <input formControlName="password" type="password" placeholder="••••••••" class="form-input">
      </div>

      <button 
        type="submit" 
        [disabled]="registerForm.invalid || isLoading" 
        class="w-full mt-4 py-5 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-[0.98] disabled:opacity-50 flex items-center justify-center gap-2"
      >
        <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        {{ isLoading ? 'Створюємо...' : 'Зареєструватися' }}
      </button>
    </form>

    <p class="mt-8 text-center text-sm text-slate-400 font-medium">
      Вже маєте профіль? 
      <a routerLink="/login" class="text-blue-600 font-black hover:text-blue-700 transition-colors ml-1">Увійти</a>
    </p>
  </div>
</div>
