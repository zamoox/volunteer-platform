<div class="min-h-[85vh] flex items-center justify-center bg-slate-50 p-4 font-sans">
  <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-10 border border-slate-100 animate-in fade-in zoom-in duration-500">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl mb-4">
        <span class="text-3xl">👋</span>
      </div>
      <h2 class="text-3xl font-black tracking-tight text-slate-900 leading-none">З поверненням!</h2>
      <p class="text-slate-400 mt-3 font-medium text-sm">Увійдіть, щоб продовжити допомагати</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
      
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Електронна пошта</label>
        <input 
          formControlName="email" 
          type="email" 
          placeholder="your@email.com" 
          class="form-input"
          [class.border-red-500]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        >
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center px-1">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Пароль</label>
          <a class="text-[10px] font-bold text-blue-500 hover:underline cursor-pointer uppercase tracking-wider">Забули?</a>
        </div>
        <input 
          formControlName="password" 
          type="password" 
          placeholder="••••••••" 
          class="form-input"
          [class.border-red-500]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading" 
        class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-sm shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-[0.98] disabled:opacity-50 disabled:shadow-none flex items-center justify-center gap-2"
      >
        <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        {{ isLoading ? 'Входимо...' : 'Увійти в систему' }}
      </button>
    </form>

    <!-- Footer link -->
    <p class="mt-10 text-center text-sm text-slate-400 font-medium">
      Ще не з нами? 
      <a 
        routerLink="/register"
        class="text-blue-600 font-black hover:text-blue-700 transition-colors ml-1">
        Створити акаунт
      </a>
    </p>
  </div>
</div>
