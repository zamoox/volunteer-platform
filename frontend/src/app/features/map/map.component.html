<div class="map-wrapper" style="position: relative; width: 100%; height: 600px;">
  <div id="map" style="width: 100%; height: 100%;"></div>

  <app-request-form 
    *ngIf="showForm"
    [lat]="selectedLat"
    [lng]="selectedLng"
    [address]="selectedAddress"
    (closed)="showForm = false"
    (submitted)="onFormSubmitted()"
  ></app-request-form>

  <app-request-details 
    *ngIf="selectedRequest" 
    [request]="selectedRequest"
    [position]="'left'" 
    (closed)="selectedRequest = null">
  </app-request-details>
</div>
