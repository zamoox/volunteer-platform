<div class="flex flex-col gap-4 p-4 h-full overflow-y-auto bg-slate-50/50">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Актуальні запити</h3>
    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-bold">LIVE</span>
  </div>

  <ng-container *ngIf="requests$ | async as requests; else loading">
    <div *ngFor="let req of requests" 
         (click)="onSelectRequest(req)"
         class="group bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all cursor-pointer">
      
      <h4 class="text-lg font-black text-slate-900 leading-tight mb-2 group-hover:text-blue-600 transition-colors">
        {{ req.title }}
      </h4>
      
      <p class="text-sm text-slate-500 line-clamp-2 mb-4 font-medium italic">
        {{ req.description }}
      </p>

      <div class="flex items-center gap-2 pt-3 border-t border-slate-50">
        <span class="text-[10px] font-black text-blue-500 uppercase tracking-tighter bg-blue-50 px-2 py-1 rounded-lg">
          📍 {{ req.location.address }}
        </span>
      </div>
    </div>
  </ng-container>

  <ng-template #loading>
    <div class="flex flex-col gap-4">
      <div *ngFor="let i of [1,2,3]" class="h-32 bg-slate-100 rounded-[2rem] animate-pulse"></div>
    </div>
  </ng-template>
</div>
