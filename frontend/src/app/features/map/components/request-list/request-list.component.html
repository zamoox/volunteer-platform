<div class="flex flex-col h-full bg-white">
  <!-- Панель фільтрів -->
  <div class="p-4 border-b border-slate-50">
    <div class="flex items-center justify-between mb-3">
      <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Фільтр</span>
      <button (click)="setCategory(null)" class="text-[10px] font-bold text-blue-600 hover:underline">Скинути</button>
    </div>
    
    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
      <button 
        *ngFor="let cat of categories"
        (click)="setCategory(cat.id)"
        class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all whitespace-nowrap border"
        [class.bg-blue-600]="(selectedCategory$ | async) === cat.id"
        [class.text-white]="(selectedCategory$ | async) === cat.id"
        [class.bg-slate-50]="(selectedCategory$ | async) !== cat.id"
        [class.border-transparent]="(selectedCategory$ | async) !== cat.id"
      >
        {{ cat.label }}
      </button>
    </div>
  </div>

  <!-- Список запитів -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
    <!-- Додаємо async пайп та перевірку на наявність даних -->
    <ng-container *ngIf="requests$ | async as requests">
      <div *ngFor="let req of requests" 
           (click)="onSelectRequest(req)"
           class="group p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-100 transition-all cursor-pointer bg-white">
        
        <div class="flex justify-between items-start mb-2">
          <span class="text-[9px] font-black uppercase text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md">
            {{ getCategoryLabel(req.category) }}
          </span>
        </div>

        <!-- ВИПРАВЛЕННЯ: Додаємо вивід заголовка та опису -->
        <h4 class="text-lg font-black text-slate-900 leading-tight mb-1 group-hover:text-blue-600 transition-colors">
          {{ req.title || 'Без назви' }}
        </h4>
        
        <p class="text-sm text-slate-500 line-clamp-2 mb-4 font-medium italic">
          {{ req.description || 'Опис відсутній' }}
        </p>

        <div class="flex items-center gap-2 pt-3 border-t border-slate-50">
          <span class="text-[10px] font-bold text-slate-400 truncate">
            📍 {{ req.location?.address || 'Київ' }}
          </span>
        </div>
      </div>

      <!-- Стан, коли запитів немає -->
      <div *ngIf="requests.length === 0" class="text-center py-10">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Запитів не знайдено</p>
      </div>
    </ng-container>
  </div>
</div>
